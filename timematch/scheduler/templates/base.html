{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Match</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="header">
        <div class="brand">Time Match</div>
        <nav class="main-nav">
            <a href="{% url 'home' %}">Home page</a>
            {% if user.is_authenticated %}
                <a href="{% url 'create_event' %}">Create Event</a>
                <a href="{% url 'join_event' %}">Join event</a>
                <a href="{% url 'availability_input' %}">Availability Input</a>
                <a href="{% url 'event_overview' %}">Event Overview</a>
                <a href="{% url 'notification_panel' %}">Notification Panel</a>
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'signup' %}">Sign up</a>
            {% endif %}
        </nav>
    </header>
</body>
</html>
