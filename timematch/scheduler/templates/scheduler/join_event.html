{% extends 'base.html' %}
{% block content %}

<section class="card">
    <h1>Join event</h1>
    <form method="post" class="form">
        {% csrf_token %}
        <label for="id_code">Event code</label>
        {{ form.code }}
        <button type="submit" class="button">Join event</button>
    </form>
</section>
{% endblock %}
