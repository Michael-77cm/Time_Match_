{% extends 'base.html' %}
{% block content %}

<section class="card">
    <h1>Notification Panel</h1>
    <form method="post">
        {% csrf_token %}
        <button type="submit" name="mark_read" value="1" class="button secondary">Mark all as read</button>
    </form>

    <ul>
        {% for note in notifications %}
            <li>
                {{ note.message }}
                <small>{{ note.created_at|date:"M j, Y g:i A" }}</small>
            </li>
        {% empty %}
            <li>No notifications yet.</li>
        {% endfor %}
    </ul>
</section>
{% endblock %}
